id: simscape-battery-mbd-bms
name: Use Model-Based Design to Build a Battery Management System
gloss: A complete model-based-design project for a Battery Management System (BMS) governing a 27 Ah Nickel-Manganese-Cobalt
  (NMC) lithium-ion battery pack, covering state estimation, protection, and cell balancing.
domain: mathworks-mbd
system_represented: A lithium-ion battery pack built from 27 Ah NMC cells together with its full battery
  management system, developed through a model-based-design workflow with requirements, system architecture,
  plant model (Simscape Battery/Electrical), and BMS control logic (Stateflow) at unit, subsystem, and
  system levels.
inputs_you_can_change:
- load / charge-discharge current profile
- initial cell states of charge (to create imbalance)
- cell-balancing algorithm parameters (e.g. bleed-resistor sizing)
- protection thresholds (over/under voltage, current, temperature)
- cell/pack chemistry and capacity parameters
outputs_you_can_observe:
- estimated cell/pack state of charge (SOC)
- cell voltages and balancing behavior over time
- protection / fault state transitions
- pack current and temperature response
runtime_required: MATLAB + Simulink + Simscape + Simscape Battery + Simscape Electrical + Stateflow +
  System Composer + Requirements Toolbox + Simulink Test
access_type: campus-or-employer-licensed
license: Proprietary (MathWorks)
scale:
  element_count: unstated — needs direct verification
  grouping: Requirements and architecture (System Composer), battery plant (Simscape Battery/Electrical),
    BMS supervisory logic (Stateflow), and test harnesses (Simulink Test), organized as a MATLAB/Simulink
    Project.
  notes: Inputs/outputs partially inferred from general Simscape Battery BMS capabilities; exact harness
    signals not enumerated on the landing page.
