suitability: Suits battery-systems and controls engineers running a full MBD toolchain; requires a licensed
  MATLAB plus many toolboxes. Substantial, not a starter example.
executability_justification: The user changes the current profile, initial SOC imbalance, balancing parameters,
  and protection thresholds, runs the simulation, and observes SOC convergence, cell-voltage balancing,
  and protection state changes.
