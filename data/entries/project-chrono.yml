  latest_release_date: https://github.com/projectchrono/chrono/releases/latest
  license: https://github.com/projectchrono/chrono
  access_link: https://github.com/projectchrono/chrono
verification_confidence:
  overall: high
  unverified:
  - access_link
  notes: GitHub release tag 10.0.0 published 2026-04-07; BSD-3-Clause confirmed via repo. The PyPI package
    named "pychrono" is an unrelated project; PyChrono module distributed via conda. access_link projectchrono.org
    not directly fetched.
