  latest_release_date: https://docs.ros.org/en/jazzy/Releases/Release-Kilted-Kaiju.html
  license: https://github.com/ros2/ros2
  access_link: https://docs.ros.org/en/kilted/index.html
verification_confidence:
  overall: high
  unverified: []
  notes: ROS distributions, not URDF spec, carry version numbers; Kilted Kaiju confirmed as current distro
    (May 2025), with Lyrical Luth LTS planned May 2026.
