suitability: Suits aerospace GNC / flight-controls engineers and advanced students; requires licensed
  MATLAB + Aerospace Blockset (FlightGear/Unreal optional for visualization).
executability_justification: The user changes control-surface inputs, wind/turbulence settings, or initial
  conditions, runs the 6DOF simulation, and observes changed attitude, trajectory, and aerodynamic force/moment
  time histories.
