id: fex-vehicle-dynamics-14dof
name: Vehicle Dynamics, 14 DOF Model in Simscape Multibody (File Exchange)
gloss: A File Exchange 14-degree-of-freedom (DOF) full-vehicle dynamics model in Simscape Multibody, with
  heave and roll at front and rear axles and a multibody tire model, exercised by several driving maneuvers.
domain: mathworks-mbd
system_represented: A full passenger vehicle modeled in Simscape Multibody with 14 degrees of freedom
  (including heave and roll at both front and rear axles) and the Simscape Multibody Tire model, used
  to study ride and handling across maneuvers and road/surface conditions.
inputs_you_can_change:
- driving maneuver (step steer, plateau, parking lot, slalom on a hill, rough road, icy surface)
- road surface / friction conditions
- steering input profile
- vehicle speed and braking input
- suspension and tire parameters
outputs_you_can_observe:
- vehicle lateral dynamics (yaw, roll)
- body heave/pitch/roll motion
- response to road slope and rough/icy surfaces
- braking and low-speed/reverse behavior
runtime_required: MATLAB + Simulink + Simscape + Simscape Multibody (versions provided for R2022a through
  R2025b)
access_type: campus-or-employer-licensed
license: BSD-style license with an added MathWorks-products-only restriction (clause 3); Copyright 2021-2022
  The MathWorks, Inc. (NOT pure BSD-3-Clause — files licensed solely for use with MathWorks products)
scale:
  element_count: 14 degrees of freedom; full multibody vehicle assembly (bodies, joints, tires) well over
    25 elements; exact block count unstated — needs direct verification
  grouping: Sprung-mass body, four-corner suspensions, multibody tire models, and maneuver/road-input
    drivers.
