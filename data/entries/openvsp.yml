id: openvsp
name: OpenVSP
gloss: OpenVSP (Open Vehicle Sketch Pad) is NASA's open-source parametric aircraft geometry tool with
  integrated analysis capabilities.
domain: aerospace-space
system_represented: Models aircraft (and other vehicle) outer-mold-line geometry parametrically, then
  supports analyses including aerodynamic predictions (VSPAERO vortex-lattice/panel solver), mass properties,
  wetted areas, and structural/parasite-drag estimation on the generated geometry.
inputs_you_can_change:
- Geometry component parameters (wing span, chord, sweep, airfoil, fuselage shape)
- Component layout and configuration
- Flight/analysis conditions (Mach, angle of attack, Reynolds number)
- VSPAERO solver settings (vortex lattice vs panel, wake iterations)
- Mass and material/structural inputs
outputs_you_can_observe:
- Aerodynamic coefficients (lift, drag, moment) and polars
- Wetted area and reference geometry
- Mass properties / center of gravity
- Parasite drag buildup
- 3D geometry and degenerate-geometry exports
runtime_required: OpenVSP desktop application (Windows/Linux/macOS) with GUI, plus AngelScript and Python
  API; includes VSPAERO solver
access_type: permissive-open
license: NASA Open Source Agreement (NOSA) v1.3
scale:
  element_count: A representative aircraft model assembles many geometry components (wings, fuselage,
    nacelles, control surfaces) whose discretized surfaces feed a VSPAERO solve over many panels/vortices,
    exceeding 25 interacting elements.
  grouping: Organized into a vehicle composed of geometry components arranged in a parent/child tree,
    with analysis modules (VSPAERO, mass properties, parasite drag) operating on the assembly.
  notes: Element count scales with number of geometry components and panel/vortex discretization.
maintenance_status:
  status: active
  latest_version: 3.50.3
  latest_release_date: '2026-05-15'
access_link: https://openvsp.org/
suitability: Aircraft conceptual designers and researchers needing rapid parametric geometry plus integrated
  aerodynamic and mass analysis.
executability_justification: Users vary geometry parameters and flight conditions and run VSPAERO or mass-property
  analyses; aerodynamic coefficients, drag, and mass outputs change observably with inputs.
