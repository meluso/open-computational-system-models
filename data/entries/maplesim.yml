id: maplesim
name: MapleSim
gloss: Commercial multidomain system-level modeling and simulation platform from Maplesoft, with symbolic
  model generation.
domain: equation-based-physical
system_represented: MapleSim (Maplesoft) is a system-level modeling and simulation tool for multidomain
  machine design, combining mechanical, electrical, control, robotics, vehicle-dynamics, and web-handling
  components into virtual prototypes. It integrates with PLC systems for virtual commissioning and digital-twin
  applications.
inputs_you_can_change:
- Component parameters within the model diagram
- System topology / component connections
- Control laws and signal inputs
- Simulation/solver settings
- Boundary and operating conditions
outputs_you_can_observe:
- Time-series simulation results of model variables
- System dynamic behavior across scenarios
- Real-time / HIL simulation responses
- Exported FMU and C-code behavior
runtime_required: MapleSim (commercial desktop application)
