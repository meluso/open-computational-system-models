id: powertrain-hev-p1
name: HEV P1 Reference Application (Powertrain Blockset)
gloss: A full Hybrid Electric Vehicle (HEV) in the P1 architecture (motor directly coupled to the engine
  crankshaft), with engine, transmission, battery, motor, and supervisory powertrain control.
domain: mathworks-mbd
system_represented: A complete passenger-car hybrid electric powertrain in the P1 configuration, where
  the electric motor is mounted on the engine crankshaft, including an internal combustion engine, transmission,
  lithium-ion battery, motor, and the associated powertrain control algorithms. Used for HIL testing,
  tradeoff analysis, and control-parameter optimization.
inputs_you_can_change:
- drive-cycle / driver scenario (reference velocity)
- environmental conditions (road grade, temperature, pressure)
- driver commands (acceleration, braking, gear)
- powertrain component sizing/parameters (Virtual Vehicle Composer)
- supervisory energy-management controller settings
outputs_you_can_observe:
- vehicle speed and acceleration
- battery state of charge (SOC)
- fuel economy and emissions
- engine and motor power/torque split
- powertrain efficiency
runtime_required: MATLAB + Simulink + Powertrain Blockset (Stateflow for controller logic)
access_type: campus-or-employer-licensed
license: Proprietary (MathWorks)
scale:
  element_count: unstated — needs direct verification
  grouping: Controller (VCU/ECU/TCU/braking), Vehicle (drivetrain, electric plant, engine), Scenarios/Environment/Driver
    Commands, and Visualization subsystems.
maintenance_status:
  status: active
  latest_version: R2026a
  latest_release_date: 2026-04
  notes: Ships in current Powertrain Blockset; per-example version not separately stated.
access_link: https://www.mathworks.com/help/autoblks/ug/explore-the-hybrid-electric-vehicle-p1-reference-application.html
suitability: Suits powertrain/controls engineers with a Simulink background; requires licensed MATLAB
  + Powertrain Blockset to run.
executability_justification: The user selects a drive cycle and changes component or controller parameters,
  runs the simulation, and observes changed vehicle speed, battery SOC, fuel economy, and emissions time
  series.
