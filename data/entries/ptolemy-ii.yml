  notes: Only routine dependency-bump commits in 2025 (e.g., rhino, jsoup, jython); no new release since
    2018.
access_link: https://ptolemy.berkeley.edu/ptolemyII/
suitability: Researchers and students studying heterogeneous models of computation, cyber-physical and
  dataflow system design.
executability_justification: Users change actor parameters, director choice, and inputs and observe changed
  plotted/token outputs when running models in Vergil. Satisfies inclusion test.
