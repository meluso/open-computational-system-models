id: ptolemy-ii
name: Ptolemy II
gloss: UC Berkeley open-source framework for modeling and simulating heterogeneous concurrent systems
  using multiple models of computation (actor-oriented design).
domain: heterogeneous-digital-twin
system_represented: Ptolemy II models heterogeneous concurrent systems—cyber-physical and IoT systems—where
  actors communicate through ports and a pluggable "director" sets the model of computation (continuous,
  discrete-event, synchronous dataflow, finite-state, etc.). Different subsystems can run under different
  semantics within one hierarchical model.
inputs_you_can_change:
- Actor parameters
- Director / model-of-computation choice per composite
- Model topology (actor wiring)
- Input data streams and source actors
- Simulation duration and solver settings
outputs_you_can_observe:
- Plotted signal time-series from plotter actors
- Actor output token streams
- State-machine transitions
- Event traces under discrete-event semantics
runtime_required: Ptolemy II (Java; Vergil graphical editor), JVM required
access_type: permissive-open
license: unstated — needs direct verification
scale:
  element_count: Representative models contain dozens of interconnected actors across hierarchical composites
  grouping: Actors grouped into hierarchical composite actors, each with its own director
  notes: Multiple models of computation in one model
maintenance_status:
