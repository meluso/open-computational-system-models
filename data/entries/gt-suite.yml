id: gt-suite
name: GT-SUITE
gloss: Commercial multi-physics system simulation platform from Gamma Technologies for engine, vehicle,
  and broader system modeling.
domain: equation-based-physical
system_represented: GT-SUITE (Gamma Technologies) is an enterprise multi-physics platform built on physics
  libraries for flow, acoustics, thermal, mechanical, electrical/electromagnetic, chemistry, controls,
  and 3D CFD/FE. Applications include engines, vehicles, batteries, fuel cells, heat exchangers, and mechanical
  systems across the product-development cycle.
inputs_you_can_change:
- Design parameters within optimization/DOE studies
- Component/library specifications and geometry
- Operating and boundary conditions
- Control signals and maps
- Input distributions for Monte Carlo / variability studies
outputs_you_can_observe:
- Performance predictions (e.g., engine power, efficiency)
- System behavior under varied conditions
- Sensitivity and optimization results
- Variability/Monte Carlo output distributions
- Time-series of flow/thermal/mechanical variables
runtime_required: GT-SUITE (commercial desktop application)
access_type: commercial
