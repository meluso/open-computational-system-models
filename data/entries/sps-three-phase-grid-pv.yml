id: sps-three-phase-grid-pv
name: Three-Phase Grid-Connected Solar Photovoltaic System
gloss: A grid-connected rooftop solar photovoltaic (PV) plant that feeds three-phase power into the grid
  at unity power factor, with maximum-power-point tracking (MPPT) and an inverter, built in Simscape Electrical.
domain: mathworks-mbd
system_represented: 'A three-phase grid-connected solar PV system with no intermediate DC-DC converter:
  parallel strings of series-connected solar panels (modeled with the Solar Cell block), an MPPT controller,
  a DC-AC inverter, and a grid interface that injects solar power at unity power factor.'
inputs_you_can_change:
- solar irradiance and temperature
- panel configuration (panels per string, parallel strings)
- MPPT technique (incremental conductance vs perturb-and-observe)
- inverter type (average, two-level, or three-level)
outputs_you_can_observe:
- real power delivered to the grid
- maximum-power-point tracking performance (DC voltage/power)
- three-phase grid current/voltage and power factor
- small-signal stability metrics (phase and gain margin from Bode plots)
runtime_required: MATLAB + Simulink + Simscape Electrical
access_type: campus-or-employer-licensed
license: Proprietary (MathWorks)
scale:
  element_count: unstated — needs direct verification
  grouping: Solar Plant subsystem, MPPT controller, inverter stage, and grid interface.
