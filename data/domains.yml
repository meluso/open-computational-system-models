# Domain registry for the catalog.
# Each entry's `domain` field MUST be one of these slugs.
# Order here controls display/order in the website and prose documents.
domains:
  - slug: executable-mbse
    name: Executable MBSE
    blurb: >-
      Model-Based Systems Engineering models that compute, not just describe:
      SysML v2 with analysis and constraint definitions, and executable Capella.
  - slug: mathworks-mbd
    name: MathWorks Model-Based Design
    blurb: >-
      Simulink, Simscape, and Stateflow reference applications and whole-system
      examples. Access is typically campus- or employer-licensed.
  - slug: mdo
    name: Multidisciplinary Design Optimization
    blurb: >-
      Frameworks that couple disciplines and optimize whole vehicles or systems,
      such as OpenMDAO and the aircraft tools built on it.
  - slug: equation-based-physical
    name: Equation-Based Physical Modeling
    blurb: >-
      Acausal, equation-based modeling of multi-domain physical systems:
      Modelica and its commercial peers, plus the FMI co-simulation standard.
  - slug: controls-dynamics-python
    name: Controls and Dynamics in Python
    blurb: >-
      Open Python libraries for control system design, optimization, and
      model-predictive control.
  - slug: des-abm
    name: Discrete-Event and Agent-Based Simulation
    blurb: >-
      Tools that simulate systems of many interacting entities or agents over
      time, from factories to traffic networks to social systems.
  - slug: power-energy
    name: Power and Energy Systems
    blurb: >-
      Power flow, distribution, capacity expansion, and building energy models
      for grids and energy systems.
  - slug: infrastructure-networks
    name: Infrastructure Networks
    blurb: >-
      Hydraulic and hydrologic models of water distribution and stormwater
      networks.
  - slug: robotics-multibody
    name: Robotics and Multibody
    blurb: >-
      Robot descriptions and physics engines that simulate articulated,
      multi-body mechanical systems.
  - slug: aerospace-space
    name: Aerospace and Space Mission
    blurb: >-
      Flight dynamics, spacecraft attitude and orbit, mission analysis, and
      aircraft geometry tools.
  - slug: wind-marine-energy
    name: Wind and Marine Energy
    blurb: >-
      Aeroelastic, wake, and wave-energy-converter models for renewable energy
      devices and farms.
  - slug: process-chemical
    name: Process and Chemical Engineering
    blurb: >-
      Steady-state and dynamic process simulators and benchmark plants for
      chemical engineering.
  - slug: circuits-electronics
    name: Circuits and Electronics
    blurb: >-
      SPICE-class circuit simulators for analog and mixed-signal electronics.
  - slug: architecture-description-langs
    name: Architecture Description Languages with Analysis
    blurb: >-
      Architecture description languages whose models drive analyses such as
      schedulability, safety, and resource budgets.
  - slug: parametric-spreadsheets
    name: Parametric Spreadsheet Models
    blurb: >-
      Openly shared spreadsheet engineering models where inputs drive
      recomputed outputs, such as link, mass, and power budgets.
  - slug: computing-dsm
    name: Computing Design Structure Matrix Models
    blurb: >-
      Design Structure Matrix models that compute change propagation or
      clustering, as distinct from static matrices.
  - slug: heterogeneous-digital-twin
    name: Heterogeneous and Digital-Twin Platforms
    blurb: >-
      Platforms that compose multiple models of computation or couple
      simulators into co-simulations and digital twins.
  - slug: systems-biology-sbml
    name: Systems Biology (adjacent)
    blurb: >-
      Curated, runnable SBML models of biological systems, included only where
      framable as a runnable multi-element engineered-style system.
  - slug: continuum-cfd
    name: Continuum Solvers (adjacent)
    blurb: >-
      Continuum mechanics solvers such as computational fluid dynamics,
      included only where framable as a runnable multi-element system.
